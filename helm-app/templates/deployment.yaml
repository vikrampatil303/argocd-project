apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-vikram
  namespace: default
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: hello-vikram
  template:
    metadata:
      labels:
        app: hello-vikram
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: hello-vikram-html
